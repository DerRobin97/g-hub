<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#161a07" />
    <title>G-Hub — Marketing-Hub</title>

    <!-- Favicons (Gerber-Hub-Markenzeichen). Versions-Query (?v=2) erzwingt das
         Neuladen nach dem Logo-Wechsel — iOS cacht das apple-touch-icon sonst hartnäckig. -->
    <link rel="icon" type="image/svg+xml" href="/app-icon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Ladescreen/Logo als eigenständige Web-Komponente (registriert <gerber-hub-loader>) -->
    <script defer src="/gerberhub-loader.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
